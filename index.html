<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MJDSGM65"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <header>
      <div class="head">Client Server</div>
    </header>

    <main>
      <div class="left">
        <div class="card">
          <i class="fas fa-th-list"></i>&nbsp; Daftar Folder
          <hr>
          <div id="repo-list">Memuat daftar folder...</div>
          <br>
        </div>
      </div>
    </main>

    <script>
      const username = 'rahayuda';
      const repo = 'Client-Server';
      const apiUrl = `https://api.github.com/repos/${username}/${repo}/contents/`;

      async function getFolders() {
        try {
          const response = await fetch(apiUrl);
          const data = await response.json();
          const listElement = document.getElementById('repo-list');

          if (response.status === 403) {
            listElement.innerText = 'Limit API tercapai, coba lagi nanti.';
            return;
          }

        listElement.innerHTML = ''; // Bersihkan teks memuat

        // Membuat container list (ul)
        const ul = document.createElement('ul');
        
        data.forEach(item => {
          // Hanya ambil item dengan tipe 'dir' (folder)
          if (item.type === 'dir') {
            const li = document.createElement('li');
            
            // Menggabungkan ikon folder dan link
            li.innerHTML = `
            <a href="${item.name}/index.html" target="_blank" rel="noopener noreferrer">
            ${item.name.replace(/-/g, ' ')}
            </a>
            `;
            ul.appendChild(li);
          }
        });
        
        // Cek jika tidak ada folder sama sekali
        if (ul.childElementCount === 0) {
          listElement.innerText = 'Tidak ada folder ditemukan.';
        } else {
          listElement.appendChild(ul);
        }

      } catch (error) {
        console.error('Gagal mengambil data:', error);
        document.getElementById('repo-list').innerText = 'Gagal memuat daftar folder.';
      }
    }

    getFolders();
  </script>
