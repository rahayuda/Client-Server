<html lang="id">
<head>

<title>CSS Z-Index</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #f3f2ef;
        font-family: 'Calibri';
        display: flex;
        justify-content: center;
    }

    /* Container Utama Kartu Profil */
    .profile-card {
        width: 70%;
        background-color: white;
        border-radius: 4px;
        overflow: hidden; /* Agar banner tidak keluar dari radius */
        margin-top: 20px;
        box-shadow: 0 0 0 1px rgba(0,0,0,0.08), 0 4px 4px rgba(0,0,0,0.3);
        position: relative;
    }

    /* Bagian Banner (Header) */
    .banner {
        width: 100%;
        height: 200px;
        background: linear-gradient(to right, #1a1f4d, #d1dce8); 
        position: relative;
    }

    /* Konten di bawah banner untuk memberi ruang bagi foto profil */
    .profile-content {
        padding: 100px 24px 24px 24px; 
    }

    /* Container Foto Profil (Lingkaran) */
    .profile-image-wrapper {
        position: absolute;
        top: 130px; /* Menentukan seberapa jauh foto menumpuk ke atas banner */
        left: 24px;  /* Jarak dari sisi kiri */
        z-index: 2;  /* Memastikan foto di atas banner */
    }

    .profile-circle {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        background-color: white;
        padding: 4px; /* Celah putih */
        box-sizing: border-box;
        border: 0px solid rgba(0,0,0,0.1);
    }

    .profile-circle img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
        display: block;
    }

    /* Badge Status Online */
    .status-badge {
        position: absolute;
        bottom: 6px;
        right: 6px;
        width: 25px;
        height: 25px;
        background-color: #1a1f4d;
        border-radius: 50%;
        border: 3px solid white;
        z-index: 3;
    }

    /* Informasi Teks */
    .user-info h1 {
        margin: 0;
        font-size: 24px;
        color: #1d1d1d;
    }

    @media screen and (max-width: 1000px) {
      main {
        flex-direction: column;
    }

    .profile-card {
        width: 90%;
    }
}

</style>
</head>
<body>

    <div class="profile-card">
        <!-- Banner Bagian Atas -->
        <div class="banner"></div>

        <!-- Foto Profil yang Menumpuk -->
        <div class="profile-image-wrapper">
            <div class="profile-circle">
                <img src="img.png" alt="Foto Profil">
            </div>
            <!-- Badge Online -->
            <div class="status-badge">👋</div>
        </div>

        <!-- Bagian Konten Bawah -->
        <div class="profile-content">
            <div class="user-info">
                <h1>Budi Santoso</h1>
                <p>Web Developer | UI/UX Enthusiast</p>
                <p>Jakarta, Indonesia</p>
            </div>
        </div>
    </div>

</body>
</html>
