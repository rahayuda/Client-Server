<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Modal CSS</title>
  <meta name="google-site-verification" content="P4tQqiPLw90HsYnebkaja0SFyi01pKRYD_VwnCmTX5Q" />
  <!-- Google Tag Manager -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-MJDSGM65');</script>
  <!-- End Google Tag Manager -->
  <style>
    * {
      /* universal */
      font-family: 'Calibri';
    }
    #modal-toggle {
      display: none;
    }

    .open-btn {
      padding: 10px 20px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 3px;
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 100vw;
      background: rgba(0,0,0,0.5);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 5px;
      width: 300px;
      text-align: center;
    }

    #modal-toggle:checked + .modal {
      display: flex;
    }

    .close-btn {
      display: inline-block;
      margin-top: 15px;
      padding: 5px 10px;
      background: #dc3545;
      color: white;
      cursor: pointer;
      border-radius: 3px;
    }

    .center {
      display: flex;
      justify-content: center;  
      align-items: center;  
      height: 100vh; 
    }
  </style>
</head>
<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MJDSGM65"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->
  
  <div class="center">
    <label for="modal-toggle" class="open-btn">Modal</label>
  </div>
  <input type="checkbox" id="modal-toggle" />

  <div class="modal">
    <div class="modal-content">
      <h2>Halo!</h2>
      <p>Ini modal tanpa JavaScript</p>
      <label for="modal-toggle" class="close-btn">close</label>
    </div>
  </div>

</body>
</html>
